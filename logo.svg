<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- 배경 pill -->
  <rect width="200" height="60" rx="12" fill="url(#bg)"/>

  <!-- 자판기 아이콘 -->
  <!-- 본체 -->
  <rect x="10" y="8" width="30" height="44" rx="4" fill="#fff" opacity="0.15"/>
  <rect x="12" y="10" width="26" height="28" rx="2" fill="#fff" opacity="0.9"/>
  <!-- 화면 반사 -->
  <rect x="14" y="12" width="10" height="4" rx="1" fill="#16a34a" opacity="0.6"/>
  <!-- 버튼들 -->
  <circle cx="18" cy="42" r="3" fill="#f05c2b"/>
  <circle cx="26" cy="42" r="3" fill="#0e9f6e"/>
  <circle cx="34" cy="42" r="3" fill="#f0c82b"/>
  <!-- 투출구 -->
  <rect x="13" y="48" width="24" height="3" rx="1.5" fill="#fff" opacity="0.4"/>
  <!-- 화면 내 아이콘 (원화 기호) -->
  <text x="25" y="28" text-anchor="middle" font-size="10" font-weight="900" fill="#14532d" font-family="sans-serif">₩</text>

  <!-- 브랜드 텍스트 -->
  <text x="52" y="28" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="900" fill="#fff" letter-spacing="-0.5">여비</text>
  <text x="90" y="28" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="900" fill="#60a5fa" letter-spacing="-0.5">POS</text>
  <!-- 서브텍스트 -->
  <text x="52" y="44" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="9.5" fill="rgba(255,255,255,0.65)" letter-spacing="0.3">무인자판기 · 포스기 · 카드단말기</text>
</svg>
