<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: linear-gradient(135deg, #052e16 0%, #16a34a 100%);
    position: relative;
  }
  .deco1 {
    position: absolute; top: -120px; right: -80px;
    width: 500px; height: 500px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .deco2 {
    position: absolute; bottom: -80px; right: 100px;
    width: 320px; height: 320px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .accent-bar {
    position: absolute; left:0; top:0; bottom:0;
    width: 10px;
    background: linear-gradient(180deg, #f05c2b, #f59e0b);
  }
  .content {
    position: absolute;
    left: 80px; top: 60px;
  }
  .brand {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
  }
  .brand-icon {
    width: 72px; height: 72px; border-radius: 14px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .brand-name {
    font-size: 64px; font-weight: 900; color: #fff;
    letter-spacing: -2px; line-height: 1;
  }
  .brand-name span { color: #f05c2b; }
  .divider {
    width: 520px; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin-bottom: 28px;
  }
  .tagline {
    font-size: 40px; font-weight: 900; color: #fff;
    letter-spacing: -1px; margin-bottom: 18px;
    line-height: 1.3;
  }
  .services {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .svc-tag {
    background: rgba(255,255,255,0.15);
    color: #fff; font-size: 20px; font-weight: 700;
    padding: 7px 18px; border-radius: 100px;
    border: 1.5px solid rgba(255,255,255,0.25);
  }
  .sub {
    font-size: 24px; color: rgba(255,255,255,0.75);
    margin-bottom: 36px; font-weight: 400;
  }
  .phone-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: linear-gradient(90deg, #f05c2b, #f59e0b);
    color: #fff; font-size: 32px; font-weight: 900;
    padding: 18px 44px; border-radius: 100px;
    letter-spacing: 1px;
  }
  .domain {
    position: absolute; right: 48px; bottom: 36px;
    font-size: 22px; color: rgba(255,255,255,0.35);
    font-family: sans-serif; letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="brand">
      <div class="brand-icon">📟</div>
      <div class="brand-name">여비<span>POS</span></div>
    </div>
    <div class="divider"></div>
    <div class="tagline">전국 포스기·카드단말기 설치 전문</div>
    <div class="services">
      <span class="svc-tag">포스기</span>
      <span class="svc-tag">카드단말기</span>
      <span class="svc-tag">키오스크</span>
      <span class="svc-tag">테이블오더</span>
      <span class="svc-tag">무인자판기</span>
    </div>
    <div class="sub">설치비 무료 &nbsp;·&nbsp; 평균 4일 이내 설치 &nbsp;·&nbsp; 24시간 A/S</div>
    <div class="phone-btn">📞 &nbsp;010-2928-3614</div>
  </div>
  <div class="domain">posmart.kr</div>
</body>
</html>
