<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 자판기 본체 -->
  <rect x="6" y="4" width="20" height="24" rx="3" fill="#fff" opacity="0.15"/>
  <rect x="7" y="5" width="18" height="15" rx="2" fill="#fff" opacity="0.95"/>

  <!-- 화면 내 ₩ -->
  <text x="16" y="16" text-anchor="middle" font-size="9" font-weight="900" fill="#14532d" font-family="sans-serif">₩</text>

  <!-- 버튼 3개 -->
  <circle cx="11" cy="24" r="2" fill="#f05c2b"/>
  <circle cx="16" cy="24" r="2" fill="#0e9f6e"/>
  <circle cx="21" cy="24" r="2" fill="#60a5fa"/>

  <!-- 투출구 -->
  <rect x="8" y="27" width="16" height="2" rx="1" fill="#fff" opacity="0.35"/>
</svg>
