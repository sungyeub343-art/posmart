<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f05c2b"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 우측 장식 원 -->
  <circle cx="1050" cy="100" r="300" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="500" r="200" fill="rgba(255,255,255,0.03)"/>

  <!-- 좌측 세로 액센트 바 -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- 로고 영역 -->
  <!-- 로고 아이콘 배경 -->
  <rect x="80" y="130" width="90" height="90" rx="18" fill="rgba(255,255,255,0.12)"/>
  <!-- 자판기 아이콘 -->
  <rect x="95" y="143" width="60" height="64" rx="6" fill="rgba(255,255,255,0.9)"/>
  <rect x="100" y="148" width="50" height="32" rx="3" fill="#16a34a"/>
  <text x="125" y="171" text-anchor="middle" font-size="18" font-weight="900" fill="#fff" font-family="sans-serif">₩</text>
  <circle cx="108" cy="196" r="6" fill="#f05c2b"/>
  <circle cx="125" cy="196" r="6" fill="#f59e0b"/>
  <circle cx="142" cy="196" r="6" fill="#60a5fa"/>
  <rect x="98" y="207" width="44" height="5" rx="2.5" fill="rgba(255,255,255,0.4)"/>

  <!-- 브랜드명 -->
  <text x="190" y="185" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">여비<tspan fill="#f05c2b">POS</tspan></text>

  <!-- 구분선 -->
  <rect x="80" y="248" width="500" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>

  <!-- 메인 태그라인 -->
  <text x="80" y="320" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">전국 포스기·카드단말기 설치 전문</text>

  <!-- 서브 태그라인 -->
  <text x="80" y="380" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif" font-size="30" font-weight="400" fill="rgba(255,255,255,0.75)">설치비 무료  ·  평균 4일 이내 설치  ·  24시간 A/S</text>

  <!-- 전화번호 버튼 -->
  <rect x="80" y="430" width="380" height="80" rx="40" fill="url(#accent)"/>
  <text x="270" y="482" text-anchor="middle" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif" font-size="34" font-weight="900" fill="#ffffff" letter-spacing="1">📞  010-2928-3614</text>

  <!-- 서비스 뱃지들 -->
  <rect x="80" y="545" width="130" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="145" y="573" text-anchor="middle" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">포스기</text>

  <rect x="225" y="545" width="150" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="300" y="573" text-anchor="middle" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">카드단말기</text>

  <rect x="390" y="545" width="150" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="465" y="573" text-anchor="middle" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">테이블오더</text>

  <rect x="555" y="545" width="150" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="630" y="573" text-anchor="middle" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">무인자판기</text>

  <!-- 우측 도메인 -->
  <text x="1120" y="600" text-anchor="end" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.4)" letter-spacing="1">posmart.kr</text>
